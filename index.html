<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#1a0a2e"/>
  <title>English Quest</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --ink:#1a0a2e;--gold:#e6a817;--gold-light:#f5cc6a;
      --teal:#2a9d8f;--teal-dark:#1d7a6e;--red:#e63946;
      --green:#2d6a4f;--green-light:#52b788;
      --shadow:rgba(26,10,46,0.2);--card:#fdf6e3;
      --ed-bg:#0d1521;--ed-panel:#152032;--ed-border:#1e3248;
      --ed-accent:#3b82f6;--ed-text:#e2e8f0;--ed-muted:#64748b;
      --ed-success:#22c55e;--ed-danger:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--ink);min-height:100dvh;height:100dvh;display:flex;align-items:stretch;justify-content:center;overflow-x:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 30%,#2d1b69 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,#0d3b5e 0%,transparent 55%),var(--ink);z-index:0;}
    .stars{position:fixed;inset:0;z-index:0;background-image:radial-gradient(1px 1px at 8% 12%,#fff,transparent),radial-gradient(1px 1px at 28% 58%,#fff,transparent),radial-gradient(1px 1px at 48% 22%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 68% 78%,#fff,transparent),radial-gradient(1px 1px at 88% 38%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 18% 82%,#fff,transparent),radial-gradient(1px 1px at 58% 52%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 92% 8%,#fff,transparent);}

    #app{position:relative;z-index:1;width:100%;max-width:500px;margin:0 auto;padding:16px;height:100dvh;display:flex;flex-direction:column;overflow-y:auto;}

    /* ── CARDS ── */
    .card{background:var(--card);border:2px solid rgba(230,168,23,.35);border-radius:24px;box-shadow:0 20px 60px var(--shadow);overflow:hidden;animation:rise .4s cubic-bezier(.22,1,.36,1);flex:1;display:flex;flex-direction:column;}
    @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    /* ── TITLE ── */
    .title-card{padding:36px 28px;text-align:center;justify-content:center;}
    .title-icon{font-size:3.5rem;margin-bottom:6px;}
    .title-main{font-family:'Lora',serif;font-size:2rem;font-weight:700;color:var(--ink);line-height:1.15;}
    .title-sub{font-size:.8rem;color:#7a6a5a;margin:6px 0 16px;letter-spacing:.07em;text-transform:uppercase;}
    .badge-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .badge{padding:4px 10px;background:rgba(42,157,143,.1);border:1px solid rgba(42,157,143,.3);border-radius:20px;font-size:.7rem;font-weight:700;color:var(--teal-dark);letter-spacing:.05em;text-transform:uppercase;}
    .title-desc{font-size:.9rem;color:#4a3e2e;line-height:1.6;margin-bottom:26px;}
    .btn-primary{display:inline-block;padding:13px 28px;background:var(--teal);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.97rem;font-weight:800;cursor:pointer;transition:background .18s,transform .1s;}
    .btn-primary:hover{background:var(--teal-dark);transform:translateY(-1px);}
    .btn-primary:active{transform:translateY(0);}
    .btn-gold{background:var(--gold);color:var(--ink);}
    .btn-gold:hover{background:var(--gold-light);}

    /* ── SELECTOR ── */
    .selector-card{padding:22px;overflow-y:auto;}
    .sel-title{font-family:'Lora',serif;font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .sel-sub{font-size:.78rem;color:#8a7a6a;margin-bottom:18px;}
    .sel-label{font-size:.7rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#8b7355;margin-bottom:7px;margin-top:14px;display:block;}
    .sel-label:first-of-type{margin-top:0;}
    .grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
    .grade-btn{padding:9px 4px;border:2px solid #d4c5a9;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;transition:all .15s;}
    .grade-btn.active{border-color:var(--teal);background:rgba(42,157,143,.08);color:var(--teal-dark);}
    .grade-btn:hover:not(.active){border-color:var(--gold);}
    .scenario-list{display:flex;flex-direction:column;gap:6px;max-height:190px;overflow-y:auto;}
    .scenario-btn{padding:9px 13px;border:2px solid #d4c5a9;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;transition:all .15s;line-height:1.3;}
    .scenario-btn .sc-num{font-size:.68rem;font-weight:800;color:#aaa;margin-right:4px;}
    .scenario-btn.active{border-color:var(--teal);background:rgba(42,157,143,.08);color:var(--teal-dark);}
    .theme-list{display:flex;flex-direction:column;gap:6px;}
    .theme-btn{padding:9px 13px;border:2px solid #d4c5a9;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;transition:all .15s;line-height:1.3;}
    .theme-btn.active{border-color:var(--teal);background:rgba(42,157,143,.08);color:var(--teal-dark);}
    .sel-actions{margin-top:18px;display:flex;gap:10px;}
    .sel-actions .btn-primary{flex:1;text-align:center;}

    /* ── LOADING ── */
    .loading-card{padding:48px 28px;text-align:center;justify-content:center;}
    .spinner{width:46px;height:46px;border:4px solid rgba(42,157,143,.2);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-title{font-family:'Lora',serif;font-size:1.15rem;color:var(--ink);font-weight:700;margin-bottom:8px;}
    .loading-sub{font-size:.83rem;color:#7a6a5a;line-height:1.5;}
    .loading-dots::after{content:'...';animation:dots 1.5s steps(4,end) infinite;}
    @keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

    /* ── HUD ── */
    .hud{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:rgba(253,246,227,.1);border:1px solid rgba(230,168,23,.3);border-radius:16px 16px 0 0;backdrop-filter:blur(6px);}
    .hud-score{font-family:'Lora',serif;color:var(--gold);font-size:.97rem;font-weight:700;}
    .hud-scene{font-size:.7rem;color:rgba(253,246,227,.5);letter-spacing:.07em;text-transform:uppercase;}
    .hud-right{display:flex;gap:6px;align-items:center;}
    .hud-btn{background:rgba(230,168,23,.12);border:1px solid rgba(230,168,23,.3);color:var(--gold);border-radius:8px;padding:4px 8px;font-size:.68rem;font-weight:800;cursor:pointer;transition:background .15s;}
    .hud-btn:hover{background:rgba(230,168,23,.25);}
    .hud-btn.muted{opacity:.45;}

    /* ── SCENE CARD ── */
    .scene-card{background:var(--card);border:2px solid rgba(230,168,23,.35);border-top:none;border-radius:0 0 24px 24px;padding:0 0 20px;box-shadow:0 20px 60px var(--shadow);overflow-y:auto;animation:rise .4s cubic-bezier(.22,1,.36,1);flex:1;display:flex;flex-direction:column;}

    /* ── CHARACTER STAGE ── */
    .stage{position:relative;width:100%;height:170px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
    .stage-bg{position:absolute;inset:0;transition:background .6s;}
    .stage-ground{position:absolute;bottom:0;left:0;right:0;height:36px;border-radius:0;}

    /* Character SVG wrapper */
    .char-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;margin-bottom:0;}
    .char-svg{width:90px;height:110px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));}

    /* Character idle float */
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes talk{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-1deg)}75%{transform:translateY(-3px) rotate(1deg)}}
    @keyframes celebrate{0%{transform:translateY(0) rotate(0deg)}20%{transform:translateY(-14px) rotate(-8deg)}40%{transform:translateY(-8px) rotate(8deg)}60%{transform:translateY(-14px) rotate(-5deg)}80%{transform:translateY(-4px) rotate(3deg)}100%{transform:translateY(0) rotate(0deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes bounce-in{0%{transform:translateY(60px);opacity:0}60%{transform:translateY(-10px);opacity:1}80%{transform:translateY(4px)}100%{transform:translateY(0)}}

    .char-anim-idle    {animation:float 3s ease-in-out infinite;}
    .char-anim-talk    {animation:talk 0.5s ease-in-out infinite;}
    .char-anim-celebrate{animation:celebrate 0.7s ease-in-out 2;}
    .char-anim-shake   {animation:shake 0.4s ease-in-out 2;}
    .char-anim-enter   {animation:bounce-in 0.6s cubic-bezier(.22,1,.36,1) forwards;}

    /* Speech bubble */
    .bubble{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid rgba(42,157,143,.35);border-radius:16px;padding:8px 13px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;color:var(--ink);max-width:200px;text-align:center;line-height:1.35;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:3;opacity:0;transition:opacity .3s;}
    .bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff;}
    .bubble.show{opacity:1;}

    /* Stars burst on correct */
    .star-burst{position:absolute;top:50%;left:50%;pointer-events:none;z-index:10;}
    .star-burst span{position:absolute;font-size:1.2rem;animation:burst .8s ease-out forwards;}
    @keyframes burst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1.2);opacity:0}}

    /* ── SCENE BODY ── */
    .scene-body{padding:14px 20px 0;}
    .char-tag{font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:2px;}
    .dialogue{font-family:'Lora',serif;font-size:.97rem;line-height:1.65;color:var(--ink);}
    .dialogue em{color:#5a3e8a;font-style:italic;}
    .ctx-note{font-size:.74rem;color:#7a6a5a;font-style:italic;margin-top:7px;padding:5px 10px;border-left:3px solid var(--gold-light);background:rgba(230,168,23,.06);border-radius:0 6px 6px 0;}

    /* Speak button */
    .speak-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 11px;background:rgba(42,157,143,.1);border:1.5px solid rgba(42,157,143,.3);border-radius:20px;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;color:var(--teal-dark);cursor:pointer;transition:all .15s;}
    .speak-btn:hover{background:rgba(42,157,143,.18);}
    .speak-btn.speaking{background:rgba(42,157,143,.2);border-color:var(--teal);animation:pulse-btn .6s ease-in-out infinite alternate;}
    @keyframes pulse-btn{from{box-shadow:0 0 0 0 rgba(42,157,143,.4)}to{box-shadow:0 0 0 6px rgba(42,157,143,0)}}

    .q-block{padding:12px 20px 0;}
    .q-label{font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#8b7355;margin-bottom:7px;}
    .q-text{font-family:'Lora',serif;font-size:.95rem;color:var(--ink);font-weight:700;margin-bottom:11px;}
    .options{display:flex;flex-direction:column;gap:7px;padding:0 20px;}
    .opt-btn{background:#fff;border:2px solid #d4c5a9;border-radius:12px;padding:10px 13px;text-align:left;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;color:var(--ink);display:flex;align-items:flex-start;gap:9px;transition:all .18s;line-height:1.4;}
    .opt-btn:hover:not(:disabled){border-color:var(--teal);background:rgba(42,157,143,.06);transform:translateX(3px);}
    .opt-letter{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#ede8df;font-size:.7rem;font-weight:800;flex-shrink:0;margin-top:1px;transition:all .18s;}
    .opt-btn.correct{border-color:var(--green);background:rgba(45,106,79,.08);color:var(--green);}
    .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
    .opt-btn.wrong{border-color:var(--red);background:rgba(230,57,70,.07);color:#b52d38;opacity:.7;}
    .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
    .opt-btn:disabled{cursor:default;}
    .feedback{margin:11px 20px 0;padding:10px 13px;border-radius:12px;font-size:.84rem;line-height:1.5;font-weight:600;display:none;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    .feedback.show{display:block;}
    .feedback.good{background:rgba(45,106,79,.1);border:1.5px solid var(--green-light);color:var(--green);}
    .feedback.bad{background:rgba(230,57,70,.08);border:1.5px solid #e08080;color:#c0303a;}
    .next-btn{display:none;margin:13px 20px 0;width:calc(100% - 40px);padding:12px;background:var(--teal);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:background .18s,transform .1s;}
    .next-btn:hover{background:var(--teal-dark);transform:translateY(-1px);}
    .next-btn.show{display:block;}

    /* ── END ── */
    .end-card{padding:38px 28px;text-align:center;justify-content:center;}
    .end-trophy{font-size:3.8rem;margin-bottom:8px;}
    .end-title{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .end-score{font-size:2.7rem;font-weight:900;color:var(--gold);font-family:'Lora',serif;margin:10px 0;}
    .end-ctx{font-size:.76rem;color:#8a7a6a;margin-bottom:6px;font-style:italic;}
    .end-msg{font-size:.9rem;color:#5a4e3e;line-height:1.6;margin-bottom:22px;}
    .end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

    /* ── EDITOR ── */
    #ed-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:18px 10px 40px;}
    #ed-overlay.open{display:flex;}
    .ed-panel{background:var(--ed-panel);border:1px solid var(--ed-border);border-radius:20px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);}
    .ed-head{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;background:var(--ed-bg);border-bottom:1px solid var(--ed-border);}
    .ed-head-title{font-size:.93rem;font-weight:800;color:var(--ed-text);display:flex;align-items:center;gap:8px;}
    .ed-pill{background:rgba(59,130,246,.15);color:var(--ed-accent);border-radius:20px;font-size:.65rem;font-weight:700;padding:2px 7px;letter-spacing:.06em;text-transform:uppercase;}
    .ed-close-btn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--ed-danger);border-radius:8px;padding:5px 10px;font-size:.76rem;font-weight:800;cursor:pointer;}
    .ed-tabs{display:flex;gap:2px;padding:9px 13px 0;background:var(--ed-bg);border-bottom:1px solid var(--ed-border);overflow-x:auto;}
    .ed-tab{padding:7px 12px;border-radius:8px 8px 0 0;font-size:.74rem;font-weight:700;color:var(--ed-muted);cursor:pointer;white-space:nowrap;border:1px solid transparent;border-bottom:none;transition:all .15s;}
    .ed-tab.active{background:var(--ed-panel);color:var(--ed-text);border-color:var(--ed-border);}
    .ed-body{padding:16px;}
    .ed-sec{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ed-muted);margin-bottom:9px;margin-top:16px;}
    .ed-sec:first-child{margin-top:0;}
    .ed-field{margin-bottom:11px;}
    .ed-lbl{display:block;font-size:.71rem;font-weight:700;color:var(--ed-muted);margin-bottom:4px;letter-spacing:.04em;}
    .ed-inp,.ed-ta{width:100%;background:var(--ed-bg);border:1px solid var(--ed-border);border-radius:8px;padding:7px 10px;color:var(--ed-text);font-family:'Nunito',sans-serif;font-size:.84rem;transition:border .15s;outline:none;}
    .ed-inp:focus,.ed-ta:focus{border-color:var(--ed-accent);}
    .ed-ta{resize:vertical;min-height:60px;line-height:1.5;}
    .opt-row{background:var(--ed-bg);border:1px solid var(--ed-border);border-radius:10px;padding:10px;margin-bottom:8px;}
    .opt-row-head{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
    .opt-badge{width:21px;height:21px;border-radius:50%;background:var(--ed-border);color:var(--ed-text);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;flex-shrink:0;}
    .correct-toggle{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.71rem;font-weight:700;color:var(--ed-muted);cursor:pointer;}
    .correct-toggle input{accent-color:var(--ed-success);}
    .emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
    .emoji-opt{font-size:1.3rem;cursor:pointer;padding:3px;border-radius:8px;border:2px solid transparent;transition:border .12s;}
    .emoji-opt.sel{border-color:var(--ed-accent);background:rgba(59,130,246,.1);}
    .color-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
    .del-sc-btn{padding:4px 8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--ed-danger);border-radius:6px;font-size:.68rem;font-weight:700;cursor:pointer;}
    .ed-actions{display:flex;gap:8px;padding:13px 17px;border-top:1px solid var(--ed-border);background:var(--ed-bg);flex-wrap:wrap;}
    .ed-btn{flex:1;min-width:68px;padding:9px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:800;cursor:pointer;border:none;transition:all .15s;}
    .ed-btn-p{background:var(--ed-accent);color:#fff;} .ed-btn-p:hover{background:#2563eb;}
    .ed-btn-s{background:rgba(148,163,184,.1);color:var(--ed-muted);border:1px solid var(--ed-border);} .ed-btn-s:hover{color:var(--ed-text);}
    .ed-btn-d{background:rgba(239,68,68,.1);color:var(--ed-danger);border:1px solid rgba(239,68,68,.2);} .ed-btn-d:hover{background:rgba(239,68,68,.2);}

    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:.81rem;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    #toast.show{opacity:1;}
    #offline-badge{position:fixed;top:10px;right:10px;z-index:50;background:rgba(239,68,68,.9);color:#fff;padding:4px 9px;border-radius:20px;font-size:.67rem;font-weight:800;display:none;}
    .scenario-list::-webkit-scrollbar{width:3px;} .scenario-list::-webkit-scrollbar-thumb{background:var(--gold-light);border-radius:3px;}
  </style>
</head>
<body>
<div class="stars"></div>
<div id="offline-badge">📵 Offline</div>
<div id="toast"></div>
<div id="app"></div>

<div id="ed-overlay">
  <div class="ed-panel">
    <div class="ed-head">
      <div class="ed-head-title">✏️ Scene Editor <span class="ed-pill">Docente</span></div>
      <button class="ed-close-btn" onclick="closeEditor()">✕ Close</button>
    </div>
    <div class="ed-tabs" id="edTabs"></div>
    <div class="ed-body" id="edBody"></div>
    <div class="ed-actions">
      <button class="ed-btn ed-btn-s" onclick="resetToGenerated()">↩ Reset</button>
      <button class="ed-btn ed-btn-d" onclick="clearSaved()">🗑 Clear</button>
      <button class="ed-btn ed-btn-p" onclick="saveEditor()">💾 Save &amp; Apply</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   CURRICULUM
════════════════════════════════════════════════ */
const CURRICULUM={
  "PreKinder":[
    {n:1,title:"Meeting New Friends",themes:["Meeting My Friends","Saying Please and Thank You"]},
    {n:2,title:"Exploring Our Classroom",themes:["Things in My Classroom","Colors in My Classroom"]},
    {n:3,title:"Me and My Family",themes:["This Is Me!","My Family"]},
    {n:4,title:"Let's Eat!",themes:["I Like Milk!","I Like Cookies!"]},
    {n:5,title:"Numbers Around Me",themes:["One, Two, Three!","How Many?"]},
    {n:6,title:"Fun with Letters",themes:["Letter Shapes","Letter Sounds"]},
    {n:7,title:"Inside My School!",themes:["Big and Small","Happy and Sad"]},
    {n:8,title:"Panama's Plants and Animals",themes:["Animals in Panama","Plants in Panama"]}
  ],

/* Map character name keywords → char key */
function resolveChar(name=''){
  const n=name.toLowerCase();
  if(n.includes('teacher')||n.includes('ms.')||n.includes('mr.')||n.includes('prof')) return 'teacher';
  if(n.includes('shop')||n.includes('vendor')||n.includes('market')||n.includes('assistant')) return 'shopkeeper';
  if(n.includes('friend')||n.includes('tom')||n.includes('ana')||n.includes('classmate')&&Math.random()>.5) return 'friend';
  if(n.includes('girl')||n.includes('sister')||n.includes('mom')||n.includes('mother')) return 'girl';
  return 'boy';
}

function renderCharSVG(key){
  const c=CHARS[key]||CHARS.boy;
  return c.svg(c.skin,c.hair,c.shirt,c.pants);
}

/* ════════════════════════════════════════════════
   WEB AUDIO ENGINE
════════════════════════════════════════════════ */
let audioCtx=null;
let soundOn=true;

function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq,dur,type='sine',vol=0.3,delay=0){
  if(!soundOn) return;
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime+delay);
    g.gain.setValueAtTime(vol,ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    o.start(ctx.currentTime+delay);
    o.stop(ctx.currentTime+delay+dur+0.05);
  }catch(e){}
}

function sfxCorrect(){
  // happy ascending arpeggio
  [[523,.15],[659,.15],[784,.15],[1047,.3]].forEach(([f,d],i)=>playTone(f,d,'triangle',0.25,i*0.12));
}
function sfxWrong(){

}

/* ════════════════════════════════════════════════
   SPEECH SYNTHESIS
════════════════════════════════════════════════ */
let speaking=false;
let currentUtterance=null;

function stripHTML(str){ return str.replace(/<[^>]*>/g,''); }

function speak(text,onEnd){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(stripHTML(text));
  u.lang='en-US'; u.rate=0.88; u.pitch=1.05;
  // prefer a good voice if available
  const voices=window.speechSynthesis.getVoices();
  const pref=voices.find(v=>v.lang.startsWith('en')&&(v.name.includes('Samantha')||v.name.includes('Google US')||v.name.includes('Microsoft Zira')));
  if(pref) u.voice=pref;
  speaking=true; currentUtterance=u;
  u.onend=()=>{speaking=false;if(onEnd)onEnd();updateSpeakBtn(false);};
  u.onerror=()=>{speaking=false;updateSpeakBtn(false);};
  window.speechSynthesis.speak(u);
  updateSpeakBtn(true);
}

function stopSpeech(){
  window.speechSynthesis?.cancel();
  speaking=false; updateSpeakBtn(false);
}

function updateSpeakBtn(isSpeaking){
  const btn=document.getElementById('speak-btn');
  if(!btn) return;
  btn.textContent=isSpeaking?'🔊 Speaking…':'🔊 Listen';
  btn.classList.toggle('speaking',isSpeaking);
}

/* ════════════════════════════════════════════════
   CHARACTER ANIMATION HELPERS
════════════════════════════════════════════════ */
function setCharAnim(anim){
  const w=document.getElementById('char-wrap');
  if(!w) return;
  w.className='char-wrap char-anim-'+anim;
}

function showBubble(text){
  const b=document.getElementById('char-bubble');
  if(!b) return;
  b.textContent=text;
  b.classList.add('show');
}
function hideBubble(){
  const b=document.getElementById('char-bubble');
  if(b) b.classList.remove('show');
}

function burstStars(correct){
  const stage=document.getElementById('char-stage');
  if(!stage) return;
  const burst=document.createElement('div');
  burst.className='star-burst';
  const emojis=correct?['⭐','✨','🌟','💫','⭐']:['💨','😅','❌'];
  emojis.forEach((e,i)=>{
    const s=document.createElement('span');
    s.textContent=e;
    const angle=(i/emojis.length)*2*Math.PI;
    const r=55+Math.random()*20;
    s.style.setProperty('--tx',`${Math.cos(angle)*r}px`);
    s.style.setProperty('--ty',`${Math.sin(angle)*r-20}px`);
    s.style.animationDelay=`${i*0.05}s`;
    burst.appendChild(s);
  });
  stage.appendChild(burst);
  setTimeout(()=>burst.remove(),1200);
}

let screen='title';
let sel={grade:null,scenario:null,theme:null};
let story=null, generatedStory=null;
let gs={si:0,score:0,answered:false};
let edTab='meta',edSi=0,edState=null;

const clone=o=>JSON.parse(JSON.stringify(o));
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function storeKey(){return `eq_story_${sel.grade}_sc${sel.scenario}_th${sel.theme}`;}
function saveStory(){if(story)localStorage.setItem(storeKey(),JSON.stringify(story));}
function loadSaved(){try{const s=localStorage.getItem(storeKey());return s?JSON.parse(s):null;}catch{return null;}}

/* ════════════════════════════════════════════════
   RENDER ROUTER

function render(){
  stopSpeech();
  const app=document.getElementById('app');
  if(screen==='title')    app.innerHTML=renderTitle();
  else if(screen==='selector') app.innerHTML=renderSelector();
  else if(screen==='loading')  app.innerHTML=renderLoading();
  else if(screen==='game')     app.innerHTML=renderHUD()+renderScene();
  else if(screen==='end')      app.innerHTML=renderEnd();
  if(screen==='game') afterRenderScene();
}

/* ── TITLE ── */

    <div class="title-main">English Quest</div>
    <div class="title-sub">Curriculum-Based Adventure</div>
    <div class="badge-row">
      <span class="badge">PreK – Grade 6</span>

    <div class="title-desc">Stories built from your official English curriculum — characters, dialogue and situations your students recognise from class.</div>
    <button class="btn-primary" onclick="sfxClick();goSelector()">Choose a Lesson ✨</button>
  </div>`;
}

/* ── SELECTOR ── */
function renderSelector(){
  const grades=Object.keys(CURRICULUM);
  const gradeHTML=grades.map(g=>`<button class="grade-btn ${sel.grade===g?'active':''}" onclick="sfxClick();pickGrade('${g}')">${g}</button>`).join('');

  if(sel.grade) scenarioHTML=`<div class="scenario-list">${CURRICULUM[sel.grade].map(sc=>`<button class="scenario-btn ${sel.scenario===sc.n?'active':''}" onclick="sfxClick();pickScenario(${sc.n})"><span class="sc-num">Sc.${sc.n}</span>${sc.title}</button>`).join('')}</div>`;
  let themeHTML=`<div style="font-size:.78rem;color:#aaa;padding:5px 0;">← Pick a scenario</div>`;

  }

      <button class="btn-primary ${canGo?'':'disabled-btn'}" ${canGo?'':'disabled'} onclick="sfxClick();startGeneration()" style="${canGo?'':'opacity:.4;cursor:not-allowed'}">Generate Story 🪄</button>

function pickGrade(g){sel={grade:g,scenario:null,theme:null};render();}
function pickScenario(n){sel.scenario=n;sel.theme=null;render();}
function pickTheme(i){sel.theme=i;render();}
function goSelector(){screen='selector';render();}

/* ── LOADING ── */
function renderLoading(){
  const sc=CURRICULUM[sel.grade].find(s=>s.n===sel.scenario);
  return`<div class="card loading-card">
    <div class="spinner"></div>
    <div class="loading-title">Creating your adventure<span class="loading-dots"></span></div>

/* ── HUD ── */
function renderHUD(){
  const sc=story.scenes[gs.si];
  return`<div class="hud">
    <div class="hud-score">⭐ ${gs.score} pts</div>
    <div class="hud-scene">${sc.theme} · ${gs.si+1}/${story.scenes.length}</div>
    <div class="hud-right">
      <button class="hud-btn ${soundOn?'':'muted'}" onclick="toggleSound()" title="Sound">${soundOn?'🔈':'🔇'}</button>
      <button class="hud-btn" onclick="openEditor()">✏️</button>
    </div>
  </div>`;
}

/* ── SCENE ── */
function renderScene(){
  const sc=story.scenes[gs.si];
  const charKey=resolveChar(sc.character);
  const charSVG=renderCharSVG(charKey);
  const groundColor=STAGE_GROUNDS[sc.bannerColor]||'#c8d8a8';
  const L=['A','B','C'];
  // Shuffle options but keep track of original indices for correct answer
  const shuffled=sc.options.map((o,i)=>({...o,origIdx:i})).sort(()=>Math.random()-.5);
  const opts=shuffled.map((o,i)=>`
    <button class="opt-btn" onclick="choose(${i},${JSON.stringify(o).replace(/"/g,'&quot;')})">
      <span class="opt-letter">${L[i]}</span><span>${o.text}</span>
    </button>`).join('');
  // Store shuffled order for this scene
  window._shuffled=shuffled;
  const cleanDialogue=stripHTML(sc.dialogue);
  return`<div class="scene-card">
    <!-- STAGE -->
    <div class="stage" id="char-stage">
      <div class="stage-bg" style="background:${sc.bannerColor}"></div>
      <div class="stage-ground" style="background:${groundColor}"></div>
      <div class="bubble" id="char-bubble">${cleanDialogue.length>60?cleanDialogue.slice(0,57)+'…':cleanDialogue}</div>
      <div class="char-wrap char-anim-enter" id="char-wrap">${charSVG}</div>
    </div>
    <!-- BODY -->
    <div class="scene-body">
      <div class="char-tag">${sc.character} says:</div>
      <div class="dialogue">"${sc.dialogue}"</div>
      <button class="speak-btn" id="speak-btn" onclick="toggleSpeak('${cleanDialogue.replace(/'/g,"\\'")}')">🔊 Listen</button>
      ${sc.contextNote?`<div class="ctx-note">${sc.contextNote}</div>`:''}
    </div>
    <div class="q-block">
      <div class="q-label">Your turn — choose:</div>
      <div class="q-text">${sc.question}</div>
    </div>
    <div class="options">${opts}</div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nb" onclick="nextScene()">
      ${gs.si<story.scenes.length-1?'Continue →':'See Results 🏆'}
    </button>
  </div>`;
}

function afterRenderScene(){
  // After bounce-in, settle into idle
  setTimeout(()=>setCharAnim('idle'),700);
  // Auto-speak dialogue after entry
  setTimeout(()=>{
    setCharAnim('talk');
    const sc=story.scenes[gs.si];
    speak(stripHTML(sc.dialogue),()=>setCharAnim('idle'));
  },900);
}

/* ── END ── */
function renderEnd(){
  const total=story.scenes.length*10,pct=Math.round(gs.score/total*100);
  const trophy=pct>=80?'🏆':pct>=50?'🥈':'📖';
  const msg=pct>=80?"Brilliant! You used lesson language like a real communicator."
           :pct>=50?"Good work! Keep practising — you're getting there!"
           :"Nice try! Review the tips and play again — you can do it!";
  const sc=CURRICULUM[sel.grade].find(s=>s.n===sel.scenario);
  return`<div class="card end-card">
    <div class="end-trophy">${trophy}</div>
    <div class="end-title">Adventure Complete!</div>
    <div class="end-score">${gs.score} / ${total}</div>
    <div class="end-ctx">${sel.grade} · Sc.${sel.scenario}: ${sc.title}</div>
    <div class="end-msg">${msg}</div>
    <div class="end-btns">
      <button class="btn-primary" onclick="sfxClick();replayStory()">▶ Play Again</button>
      <button class="btn-primary btn-gold" onclick="sfxClick();goSelector()">New Lesson</button>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════
   GAME EVENTS
════════════════════════════════════════════════ */
function toggleSpeak(text){
  if(speaking){stopSpeech();setCharAnim('idle');return;}
  setCharAnim('talk');
  speak(text,()=>setCharAnim('idle'));
}

function toggleSound(){
  soundOn=!soundOn;
  if(!soundOn) stopSpeech();
  render();
}

function choose(i){
  if(gs.answered)return;
  gs.answered=true;
  stopSpeech();
  const sc=story.scenes[gs.si];
  // Use shuffled order if available
  const opt=(window._shuffled||sc.options)[i];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  if(opt.correct){
    gs.score+=10;
    btns[i].classList.add('correct');
    document.getElementById('fb').className='feedback good show';
    setCharAnim('celebrate');
    sfxCorrect();
    burstStars(true);
    showBubble('⭐ Great job!');
    setTimeout(()=>hideBubble(),2200);
  } else {
    btns[i].classList.add('wrong');
    (window._shuffled||sc.options).forEach((o,j)=>{if(o.correct)btns[j].classList.add('correct');});
    document.getElementById('fb').className='feedback bad show';
    setCharAnim('shake');
    sfxWrong();
    burstStars(false);
    showBubble('Try again! 💪');
    setTimeout(()=>{hideBubble();setCharAnim('idle');},1800);
  }
  document.getElementById('fb').innerHTML=opt.feedback;
  document.getElementById('nb').classList.add('show');
}

function nextScene(){
  sfxNextScene();
  stopSpeech();
  if(gs.si<story.scenes.length-1){gs.si++;gs.answered=false;render();}
  else{sfxWin();screen='end';render();}
}
function replayStory(){gs={si:0,score:0,answered:false};screen='game';render();}

/* ════════════════════════════════════════════════
   AI GENERATION
════════════════════════════════════════════════ */
async function startGeneration(){
  const sc=CURRICULUM[sel.grade].find(s=>s.n===sel.scenario);
  const theme=sc.themes[sel.theme];
  const cached=loadSaved();
  if(cached){story=cached;generatedStory=clone(cached);gs={si:0,score:0,answered:false};screen='game';render();return;}
  screen='loading';render();

  const levelDesc={
    'PreKinder':'very simple 2-3 word phrases, no complex grammar',
    'Kinder':'simple 3-5 word sentences, basic nouns and verbs',
    'Grade 1':'A1 short sentences, present simple, basic adjectives',
    'Grade 2':'A1 sentences, simple past, adjectives, common phrases',
    'Grade 3':'A1-A2 sentences, requests, prepositions, routines',
    'Grade 4':'A2 sentences, comparatives, present continuous, modals',
    'Grade 5':'A2 sentences, have to/should, past simple, descriptions',
    'Grade 6':'A2-B1 sentences, present perfect, future will, discussions'
  }[sel.grade]||'A1-A2 sentences';

  const prompt=`You are an ESL curriculum game designer for Panama schools (${sel.grade}).

Create a 10-scene interactive adventure based on:
- Grade: ${sel.grade}  
- Scenario ${sel.scenario}: "${sc.title}"
- Theme: "${theme}"
- Language level: ${levelDesc}

Return ONLY valid JSON (no markdown, no backticks):
{
  "title": "5-7 word adventure title",
  "subtitle": "3-5 word subtitle",
  "intro": "One sentence scene-setting intro, max 25 words",
  "scenes": [
    {
      "id": "s1",
      "theme": "2-3 word label",
      "banner": "ONE emoji representing the scene",
      "bannerColor": "soft hex color e.g. #e8f4f8",
      "character": "Character name and role (e.g. 'Ms. Green, your teacher')",
      "dialogue": "Character dialogue. Wrap 1-2 KEY VOCABULARY WORDS in <em> tags. Max 30 words.",
      "contextNote": "🌟 Tip: One grammar/vocabulary tip. Max 15 words.",
      "question": "Clear language-use question for the student",
      "options": [
        {"letter":"A","text":"Correct natural English response","correct":true,"feedback":"✅ Explanation of why correct, mentions grammar/vocabulary"},
        {"letter":"B","text":"Plausible but wrong response","correct":false,"feedback":"❌ Gentle explanation of the error"},
        {"letter":"C","text":"Another plausible but wrong response","correct":false,"feedback":"❌ Gentle explanation of the error"}
      ]
    }
  ]
}

RULES:
- All 10 scenes must feel like a connected story set in the world of "${theme}"
- Characters: use relatable Panamanian school/community roles (teacher, classmate, shopkeeper, parent, friend)
- Language must match EXACTLY the level: ${levelDesc}
- Each bannerColor must be different and soft (light pastels)
- Correct answer is always index 0 (option A) — the app will shuffle display order automatically
- Feedback must teach, not just label correct/wrong`;

  try{
    // Proxy URL — update with your actual Vercel deployment URL
    const PROXY_URL = 'https://eq-proxy.vercel.app/api/anthropic';
    const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})});
    if(!res.ok) throw new Error('API '+res.status+': '+res.statusText);
    const data=await res.json();
    if(data.error) throw new Error('API error: '+data.error.message);
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    if(!raw) throw new Error('Empty API response');
    const clean=raw.replace(/```json|```/g,'').trim();
    story=JSON.parse(clean);
    generatedStory=clone(story);
    saveStory(); // only save real AI stories
    gs={si:0,score:0,answered:false};screen='game';render();
  }catch(e){
    console.error('Story generation failed:',e);
    story=buildFallback(sc,theme);
    generatedStory=clone(story);
    // fallback is NOT saved — next visit will retry the API
    gs={si:0,score:0,answered:false};screen='game';render();
    showToast('⚠️ Offline: '+e.message,true);
  }
}

  return{title:`${sc.title} Adventure`,subtitle:'English Quest',intro:`Practice English with the theme: ${theme}`,
    scenes:[
      {id:'s1',theme:sc.title,banner:'🏫',bannerColor:'#e8f4f8',character:'Your teacher, Ms. Green',
       dialogue:`Today we practice: <em>${theme}</em>. Are you ready?`,contextNote:'🌟 Tip: Listen and choose the best answer.',

      {id:'s2',theme:'Greeting',banner:'👋',bannerColor:'#f0f8e8',character:'Your classmate, Ana',

function switchEdTab(tab,idx=0){edCollect();edTab=tab;if(tab==='scene')edSi=idx;renderEditor();}
function edCollect(){
  if(edTab==='meta'){
    edState.title   =document.getElementById('ef-t')?.value??edState.title;
    edState.subtitle=document.getElementById('ef-s')?.value??edState.subtitle;
    edState.intro   =document.getElementById('ef-i')?.value??edState.intro;
  } else {
    const sc=edState.scenes[edSi];
    sc.theme      =document.getElementById('ef-th')?.value??sc.theme;
    sc.character  =document.getElementById('ef-ch')?.value??sc.character;
    sc.dialogue   =document.getElementById('ef-dl')?.value??sc.dialogue;
    sc.contextNote=document.getElementById('ef-cn')?.value??'';
    sc.question   =document.getElementById('ef-q')?.value??sc.question;
    sc.options.forEach((o,i)=>{o.text=document.getElementById(`ot-${i}`)?.value??o.text;o.feedback=document.getElementById(`of-${i}`)?.value??o.feedback;});
  }
}
function edPickEmoji(e){edCollect();edState.scenes[edSi].banner=e;renderEditor();}
function edPickColor(c){edCollect();edState.scenes[edSi].bannerColor=c;renderEditor();}
function edSetCorrect(i){edState.scenes[edSi].options.forEach((o,j)=>o.correct=(j===i));}
function addEdScene(){
  edCollect();
  edState.scenes.push({id:'s'+Date.now(),theme:'New Scene',banner:'🎯',bannerColor:'#e8f4f8',character:'Character',dialogue:'Write dialogue here.',contextNote:'🌟 Tip: Add a tip here.',question:'What is the best answer?',
    options:[{letter:'A',text:'Option A',correct:true,feedback:'✅ Correct!'},{letter:'B',text:'Option B',correct:false,feedback:'❌ Try again.'},{letter:'C',text:'Option C',correct:false,feedback:'❌ Try again.'}]});
  edSi=edState.scenes.length-1;edTab='scene';renderEditor();
}
function edDelScene(i){
  if(edState.scenes.length<=1){showToast('⚠️ Need at least 1 scene',true);return;}
  edState.scenes.splice(i,1);edSi=Math.max(0,i-1);edTab='scene';renderEditor();
}
function saveEditor(){
  edCollect();
  if(!edState.scenes.every(sc=>sc.options.some(o=>o.correct))){showToast('⚠️ Mark correct option in each scene',true);return;}
  story=clone(edState);saveStory();closeEditor();
  gs={si:0,score:0,answered:false};screen='game';render();showToast('✅ Story saved!');
}
function resetToGenerated(){if(!confirm('Reset to the AI-generated story?'))return;edState=clone(generatedStory);edTab='meta';edSi=0;renderEditor();showToast('↩ Story reset');}
function clearSaved(){if(!confirm('Clear saved story? AI will regenerate next time.'))return;localStorage.removeItem(storeKey());edState=clone(generatedStory);edTab='meta';edSi=0;renderEditor();showToast('🗑 Cache cleared');}

/* ════════════════════════════════════════════════
   TOAST / OFFLINE / SW
════════════════════════════════════════════════ */
function showToast(msg,warn=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=warn?'#b45309':'var(--green)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);
}
window.addEventListener('online', ()=>document.getElementById('offline-badge').style.display='none');
window.addEventListener('offline',()=>document.getElementById('offline-badge').style.display='block');
if(!navigator.onLine)document.getElementById('offline-badge').style.display='block';
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// Preload voices
window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener('voiceschanged',()=>{});

render();
</script>
